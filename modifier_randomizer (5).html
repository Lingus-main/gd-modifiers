* { position: relative; z-index: 1; }
.label { font-size: 10px; letter-spacing: 0.3em; color: #888; text-transform: uppercase; margin-bottom: 1.5rem; }
.controls { display: flex; gap: 12px; align-items: center; margin-bottom: 2rem; }
select { background: #111; color: #aaa; border: 0.5px solid #333; border-radius: 4px; padding: 8px 12px; font-size: 12px; font-family: inherit; letter-spacing: 0.05em; }
button { background: transparent; color: #ccc; border: 0.5px solid #555; border-radius: 4px; padding: 11px 36px; font-size: 13px; font-family: inherit; letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase; }
button:hover { background: #1a1a1a; color: #fff; border-color: #888; }
button:active { transform: scale(0.97); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; width: 100%; max-width: 680px; }
.card { background: rgba(20,20,20,0.92); border: 0.5px solid #2a2a2a; border-radius: 6px; overflow: hidden; animation: fadein 0.3s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; filter: brightness(0.9); }
.card-body { padding: 10px 12px 12px; }
.day-tag { font-size: 9px; letter-spacing: 0.25em; color: #777; text-transform: uppercase; margin-bottom: 5px; }
.card-name { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: #ddd; margin-bottom: 5px; }
.card-desc { font-size: 11px; color: #888; line-height: 1.6; margin-bottom: 6px; }
.card-bonus { font-size: 10px; color: #b8942a; letter-spacing: 0.05em; }
.empty { color: #333; font-size: 11px; text-align: center; padding: 3rem 0; letter-spacing: 0.15em; width: 100%; }
</style>

const MODS = [
  { name: "Elite Reinforcements", desc: "Free shock trooper on completion.", bonus: "Shock trooper of choice granted.", img: imgs["elite"] },
  { name: "Hard Rocks", desc: "Hardest task only (weak list once populated).", bonus: "+1 per task", img: imgs["hardrocks"] },
  { name: "Cave Fog", desc: "Brain dump everything before opening notes.", bonus: "+2 flat", img: imgs["cavefog"] },
  { name: "Truce", desc: "Teaching session only.", bonus: "+3 if proof received", img: imgs["truce"] },
  { name: "Restoration", desc: "Pomodoros extended to 35 min.", bonus: "+1 per pomodoro", img: imgs["restoration"] },
  { name: "Minesweeper", desc: "Random topic inserted mid-session.", bonus: "+3 if completed, -1 if ignored", img: imgs["minesweeper"] },
  { name: "Dreadnought", desc: "One boss task — must be done last.", bonus: "2x medals if done, 0 if skipped", img: imgs["dreadnought"] },
];
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
function shuffle(a) {
  let arr = [...a];
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function roll() {
  const sfx = document.getElementById('sfx');
  sfx.currentTime = 0;
  sfx.play();
  const n = parseInt(document.getElementById('count').value);
  const mods = shuffle(MODS).slice(0, n);
  const days = shuffle(DAYS).slice(0, n).sort((a,b) => DAYS.indexOf(a)-DAYS.indexOf(b));
  document.getElementById('grid').innerHTML = mods.map((m,i) => `
    <div class="card">
      <img src="data:image/png;base64,${m.img}" alt="${m.name}">
      <div class="card-body">
        <div class="day-tag">— ${days[i]} —</div>
        <div class="card-name">${m.name}</div>
        <div class="card-desc">${m.desc}</div>
        ${m.bonus ? `<div class="card-bonus">${m.bonus}</div>` : ''}
      </div>
    </div>
  `).join('');
}
</script>
